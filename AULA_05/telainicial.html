<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop - Home</title>
    <style>
        /* =======================================================
           1. RESET PADRÃO
           ======================================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
        }

        /* =======================================================
           2. TOPO PRETO (HEADER)
           ======================================================= */
        .topo-preto {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            width: 100%;
        }

        .foto-perfil {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        .topo-preto h3 {
            font-size: 1.1rem;
            font-weight: 500;
            flex-grow: 1;
            text-align: center;
        }

        .logo-petshop {
            font-style: italic;
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* =======================================================
           3. CAMPO DE PESQUISA
           ======================================================= */
        .container-pesquisa {
            display: flex;
            justify-content: center;
            margin: 40px 0 30px 0;
        }

        .input-pesquisa {
            width: 100%;
            max-width: 420px;
            height: 45px;
            border: 1px solid #999999;
            border-radius: 25px;
            padding: 0 20px;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        /* =======================================================
           4. SEÇÃO DE CATEGORIAS (CARDS DOS ANIMAIS)
           ======================================================= */
        .secao-categorias {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card-categoria {
            position: relative;
            width: 160px;
            height: 190px;
            border-radius: 25px;
            overflow: hidden;
            background-color: #1a1a1a; /* Fundo escuro enquanto a foto não carrega */
        }

        .card-categoria img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(75%); /* Deixa a imagem mais escura pro texto destacar */
        }

        .card-categoria span {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* =======================================================
           5. BANNER INFERIOR PRETO
           ======================================================= */
        .banner-inferior {
            background-color: #000000;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .card-promocao-branco {
            background-color: #ffffff;
            width: 100%;
            max-width: 780px;
            border-radius: 35px;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .info-promocao {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-promocao h2 {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            color: #000000;
        }

        .btn-juntar-se {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            width: fit-content;
        }

        .foto-banner-gato {
            width: 260px;
            height: 160px;
            border-radius: 25px;
            object-fit: cover;
        }

        /* Ajuste para celular */
        @media (max-width: 650px) {
            .card-promocao-branco {
                flex-direction: column;
                text-align: center;
            }
            .info-promocao {
                align-items: center;
            }
            .foto-banner-gato {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <header class="topo-preto">
        <img src="perfil.png" class="foto-perfil" alt="Perfil">
        
        <h3>Encontre tudo para o seu pet</h3>
        <span class="logo-petshop">petshop</span>
    </header>

    <div class="container-pesquisa">
        <input type="text" class="input-pesquisa" placeholder="Pesquisar">
    </div>

    <main class="secao-categorias">
        
        <div class="card-categoria">
            <img src="gato.jpg" alt="Gatos">
            <span>gatos</span>
        </div>

        <div class="card-categoria">
            <img src="cachorro.jpg" alt="Cachorros">
            <span>cachorros</span>
        </div>

        <div class="card-categoria">
            <img src="ave.png" alt="Aves">
            <span>aves</span>
        </div>

        <div class="card-categoria">
            <img src="peixe.png" alt="Peixes">
            <span>peixes</span>
        </div>

    </main>

    <section class="banner-inferior">
        <div class="card-promocao-branco">
            
            <div class="info-promocao">
                <h2>Torne-se um membro<br>Ganhe um desconto</h2>
                <button class="btn-juntar-se">Juntar-se</button>
            </div>

            <img src="gato_laranja.jpg" class="foto-banner-gato" alt="Membro Desconto">

        </div>
    </section>

</body>
</html>
